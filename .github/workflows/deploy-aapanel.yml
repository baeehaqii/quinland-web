name: deploy-aapanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger aaPanel webhook
        env:
          AAPANEL_WEBHOOK_URL: ${{ secrets.AAPANEL_WEBHOOK_URL }}
        run: |
          if [ -z "${AAPANEL_WEBHOOK_URL}" ]; then
            echo "Missing GitHub secret: AAPANEL_WEBHOOK_URL"
            exit 1
          fi

          code=$(curl -sS -o /tmp/aapanel_webhook_response.txt -w "%{http_code}" \
            -X POST "$AAPANEL_WEBHOOK_URL")

          echo "aaPanel webhook HTTP status: $code"
          cat /tmp/aapanel_webhook_response.txt || true

          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "aaPanel webhook trigger failed"
            exit 1
          fi

      - name: Optional health check
        if: ${{ secrets.DEPLOY_HEALTHCHECK_URL != '' }}
        env:
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
        run: |
          curl -fsS "$DEPLOY_HEALTHCHECK_URL" > /dev/null
          echo "Health check passed"
